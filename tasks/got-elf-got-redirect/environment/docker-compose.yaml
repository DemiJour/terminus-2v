# When this file exists, Harbor uses it as the *entire* Compose project (single -f),
# not as a merge layer. It must mirror stock docker-compose-build.yaml (build,
# image, volumes, deploy, TEST_DIR) plus any overrides — here `network_mode: host`
# to avoid exhausting Docker bridge address pools on busy machines.
services:
  main:
    build:
      context: ${CONTEXT_DIR}
    image: ${MAIN_IMAGE_NAME}
    command: ["sh", "-c", "sleep infinity"]
    environment:
      - TEST_DIR=${TEST_DIR}
    volumes:
      - ${HOST_VERIFIER_LOGS_PATH}:${ENV_VERIFIER_LOGS_PATH}
      - ${HOST_AGENT_LOGS_PATH}:${ENV_AGENT_LOGS_PATH}
    deploy:
      resources:
        limits:
          cpus: ${CPUS}
          memory: ${MEMORY}
    network_mode: host
