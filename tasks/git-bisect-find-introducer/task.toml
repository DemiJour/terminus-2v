version = "2.0"

[metadata]
author_name = "Richard"
author_email = "rickjmcwork@gmail.com"
difficulty = "medium"
category = "software-engineering"
subcategories = [ "tool_specific" ]
number_of_milestones = 0
codebase_size = "small"
languages = [ "bash", "python" ]
expert_time_estimate_min = 45
junior_time_estimate_min = 120
tags = [ "git", "bisect", "version-control", "debugging", "git-history" ]
# Required when environment/docker-compose.yaml is present (Harbor merges it with base compose).
is_multi_container = true
custom_docker_compose = true

[verifier]
timeout_sec = 450.0

[agent]
timeout_sec = 900.0

[environment]
build_timeout_sec = 600.0
cpus = 2
memory_mb = 2048
storage_mb = 4096
allow_internet = true
